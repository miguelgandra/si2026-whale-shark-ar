<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whale Shark AR – SI2026</title>

    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.4.0/dist/aframe-extras.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <!-- ============================================================ -->
    <!--  Optional: Google Analytics 4                                -->
    <!--  Replace G-XXXXXXXXXX with your GA4 Measurement ID          -->
    <!-- ============================================================ -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){ dataLayer.push(arguments); }
        gtag('js', new Date());

        // --- DEVELOPER EXCLUSION LOGIC ---
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('dev') === 'true') {
            localStorage.setItem('is_developer', 'true');
            alert('Developer Mode Enabled: Analytics excluded from this session.');
        }
        const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        const isDevMode  = localStorage.getItem('is_developer') === 'true';

        if (!isLocalhost && !isDevMode) {
            gtag('config', 'G-XXXXXXXXXX', {
                'page_path': '/index.html',
                'page_title': 'Whale Shark AR – SI2026',
                'anonymize_ip': true
            });
        } else {
            console.log('GA4: Analytics blocked (Developer/Localhost mode).');
        }

        // ============================================================
        //  Unlock HTML5 video elements for mobile browsers.
        //  Called once on the starter-overlay tap to satisfy the
        //  browser's "user gesture required" requirement for video.
        // ============================================================
        function unlockVideos() {
            const ids = [
                '#videoLungeFeeding',
                '#videoStationaryFeeding',
                '#videoIntraspecific',
                '#videoSnipefish'
            ];
            ids.forEach(id => {
                const v = document.querySelector(id);
                if (!v) return;
                v.play()
                  .then(() => { v.pause(); v.currentTime = 0; console.log('✅ Unlocked:', id); })
                  .catch(e => console.log('ℹ️ Video will play on demand:', id, e.message));
            });
        }
    </script>

    <script>
        // ============================================================
        //  COMPONENT: clickable
        //  Opens a URL in a new tab when an A-Frame entity is clicked.
        //  Mirrors the pattern from the example boilerplate.
        // ============================================================
        AFRAME.registerComponent('clickable', {
            schema: { url: { type: 'string', default: '' } },
            init: function () {
                this.onClick = () => {
                    if (!this.data.url) return;
                    const isDev = localStorage.getItem('is_developer') === 'true';
                    if (typeof gtag === 'function' && !isDev) {
                        gtag('event', 'ar_link_clicked', {
                            event_category: 'AR Interaction',
                            event_label: this.data.url
                        });
                    }
                    window.open(this.data.url, '_blank');
                };
                this.el.addEventListener('click', this.onClick);
            },
            remove: function () { this.el.removeEventListener('click', this.onClick); }
        });

        // ============================================================
        //  COMPONENT: ar-handler
        //  Main orchestrator for the SI2026 Whale Shark AR experience.
        //
        //  Responsibilities:
        //   • Show / hide all AR content on targetFound / targetLost
        //   • Manage the 4-video popup system (Foraging Ecology)
        //   • Manage the Azores map popup
        //   • Control 3D model visibility and animation playback
        // ============================================================
        AFRAME.registerComponent('ar-handler', {
            init: function () {
                console.log('🦈 AR handler initialised.');

                // ── Core poster ─────────────────────────────────────
                this.poster       = this.el.querySelector('#static-poster');
                this.panelOverlay = this.el.querySelector('#panel-overlay');

                // ── 3D Models ────────────────────────────────────────
                this.orbitParent  = this.el.querySelector('#orbit-parent');
                this.whaleShark   = this.el.querySelector('#whale-shark');
                this.fishParticle = this.el.querySelector('#fish-particle');
                this.iPilot       = this.el.querySelector('#ipilot-model');

                // ── Side content (profile + contacts) ────────────────
                this.sideContent  = this.el.querySelector('#side-content');

                // ── Video system ─────────────────────────────────────
                this.videoButtons  = this.el.querySelector('#video-buttons');
                this.videoPopup    = this.el.querySelector('#video-popup');
                this.videoScreen   = this.el.querySelector('#video-screen');
                this.videoTitle    = this.el.querySelector('#video-title-text');
                this.activeVideoEl = null;

                // ── Azores map system ────────────────────────────────
                this.azoresHitbox = this.el.querySelector('#azores-hitbox');
                this.azoresPopup  = this.el.querySelector('#azores-popup');

                // ── State ────────────────────────────────────────────
                this.targetVisible = false;

                // ════════════════════════════════════════════════════
                //  SHOW / HIDE ALL CONTENT
                // ════════════════════════════════════════════════════
                this.showContent = () => {
                    this.poster.setAttribute('visible', true);
                    this.orbitParent.setAttribute('visible', true);
                    this.iPilot.setAttribute('visible', true);
                    this.sideContent.setAttribute('visible', true);
                    this.videoButtons.setAttribute('visible', true);
                    this.azoresHitbox.setAttribute('visible', true);
                    // Resume 3D model animations
                    this.whaleShark.setAttribute('animation-mixer', 'timeScale: 1');
                    this.fishParticle.setAttribute('animation-mixer', 'timeScale: 1');
                    console.log('✅ Content visible.');
                };

                this.hideContent = () => {
                    this.poster.setAttribute('visible', false);
                    this.orbitParent.setAttribute('visible', false);
                    this.iPilot.setAttribute('visible', false);
                    this.sideContent.setAttribute('visible', false);
                    this.videoButtons.setAttribute('visible', false);
                    this.azoresHitbox.setAttribute('visible', false);
                    // Pause 3D model animations
                    this.whaleShark.setAttribute('animation-mixer', 'timeScale: 0');
                    this.fishParticle.setAttribute('animation-mixer', 'timeScale: 0');
                    // Close any open popup
                    this.closeAll();
                    console.log('⏸ Content hidden.');
                };

                // ════════════════════════════════════════════════════
                //  VIDEO POPUP LOGIC
                //  videoId: CSS selector like '#videoLungeFeeding'
                //  label:   display name for the title bar
                // ════════════════════════════════════════════════════
                this.openVideo = (videoId, label) => {
                    // Pause and reset any previously active video
                    if (this.activeVideoEl) {
                        this.activeVideoEl.pause();
                        this.activeVideoEl.currentTime = 0;
                    }
                    // Point video screen at the new source
                    this.activeVideoEl = document.querySelector(videoId);
                    this.videoScreen.setAttribute('material', 'src', videoId);
                    this.videoScreen.setAttribute('material', 'shader', 'flat');
                    // Update title label
                    if (this.videoTitle) this.videoTitle.setAttribute('value', label);
                    // Show popup + overlay
                    this.videoPopup.setAttribute('visible', true);
                    this.panelOverlay.setAttribute('visible', true);
                    // Play
                    if (this.activeVideoEl) {
                        this.activeVideoEl.play().catch(e =>
                            console.error('❌ Video play error:', e));
                    }
                    console.log('▶ Opening video:', videoId, label);
                };

                this.closeVideo = () => {
                    if (this.activeVideoEl) {
                        this.activeVideoEl.pause();
                        this.activeVideoEl.currentTime = 0;
                        this.activeVideoEl = null;
                    }
                    this.videoPopup.setAttribute('visible', false);
                    this.panelOverlay.setAttribute('visible', false);
                    console.log('⏹ Video closed.');
                };

                // ════════════════════════════════════════════════════
                //  AZORES MAP POPUP LOGIC
                // ════════════════════════════════════════════════════
                this.openMap = () => {
                    // Close video if open
                    if (this.activeVideoEl) {
                        this.activeVideoEl.pause();
                        this.activeVideoEl.currentTime = 0;
                        this.activeVideoEl = null;
                        this.videoPopup.setAttribute('visible', false);
                    }
                    this.azoresPopup.setAttribute('visible', true);
                    this.panelOverlay.setAttribute('visible', true);
                    console.log('🗺 Azores map opened.');
                };

                this.closeMap = () => {
                    this.azoresPopup.setAttribute('visible', false);
                    this.panelOverlay.setAttribute('visible', false);
                    console.log('🗺 Azores map closed.');
                };

                // ════════════════════════════════════════════════════
                //  CLOSE EVERYTHING (used on targetLost + close btns)
                // ════════════════════════════════════════════════════
                this.closeAll = () => {
                    if (this.activeVideoEl) {
                        this.activeVideoEl.pause();
                        this.activeVideoEl.currentTime = 0;
                        this.activeVideoEl = null;
                    }
                    this.videoPopup.setAttribute('visible', false);
                    this.azoresPopup.setAttribute('visible', false);
                    this.panelOverlay.setAttribute('visible', false);
                };

                // ════════════════════════════════════════════════════
                //  TARGET EVENTS
                // ════════════════════════════════════════════════════
                this.onTargetFound = () => {
                    console.log('🎯 Target found!');
                    this.targetVisible = true;
                    // GA4 tracking
                    const isDev = localStorage.getItem('is_developer') === 'true';
                    if (typeof gtag === 'function' && !isDev) {
                        gtag('event', 'ar_target_detected', {
                            event_category: 'AR Engagement',
                            event_label: 'SI2026 Whale Shark Poster'
                        });
                    }
                    this.showContent();
                };

                this.onTargetLost = () => {
                    console.log('❌ Target lost.');
                    this.targetVisible = false;
                    this.hideContent();
                };

                // ════════════════════════════════════════════════════
                //  VIDEO BUTTON HANDLERS
                //  ⚠ PROVISIONAL: Coordinates set in the HTML below.
                //    Use coordinate-finder.html to verify positions
                //    against the actual printed poster.
                //
                //  Mapping (verify legends on poster images):
                //    Button 1 (top-left)     → Lunge Feeding
                //    Button 2 (top-right)    → Stationary Feeding
                //    Button 3 (bottom-left)  → Intraspecific Aggregation
                //    Button 4 (bottom-right) → Snipefish
                // ════════════════════════════════════════════════════
                this.onVideoBtn1 = () => this.openVideo('#videoLungeFeeding',       '▶  Lunge Feeding');
                this.onVideoBtn2 = () => this.openVideo('#videoStationaryFeeding',  '▶  Stationary Feeding');
                this.onVideoBtn3 = () => this.openVideo('#videoIntraspecific',      '▶  Intraspecific Aggregation');
                this.onVideoBtn4 = () => this.openVideo('#videoSnipefish',          '▶  Snipefish');
                this.onCloseVideo = () => this.closeVideo();

                // ════════════════════════════════════════════════════
                //  AZORES MAP HANDLERS
                // ════════════════════════════════════════════════════
                this.onAzoresClick = () => this.openMap();
                this.onCloseMap    = () => this.closeMap();

                // ════════════════════════════════════════════════════
                //  BIND ALL EVENT LISTENERS
                // ════════════════════════════════════════════════════
                this.el.addEventListener('targetFound', this.onTargetFound);
                this.el.addEventListener('targetLost',  this.onTargetLost);

                // Video buttons
                this.el.querySelector('#video-btn-1').addEventListener('click', this.onVideoBtn1);
                this.el.querySelector('#video-btn-2').addEventListener('click', this.onVideoBtn2);
                this.el.querySelector('#video-btn-3').addEventListener('click', this.onVideoBtn3);
                this.el.querySelector('#video-btn-4').addEventListener('click', this.onVideoBtn4);
                this.el.querySelector('#close-video-btn').addEventListener('click', this.onCloseVideo);

                // Azores map
                this.azoresHitbox.addEventListener('click', this.onAzoresClick);
                this.el.querySelector('#close-map-btn').addEventListener('click', this.onCloseMap);
            },

            remove: function () {
                this.el.removeEventListener('targetFound', this.onTargetFound);
                this.el.removeEventListener('targetLost',  this.onTargetLost);
                this.el.querySelector('#video-btn-1')?.removeEventListener('click', this.onVideoBtn1);
                this.el.querySelector('#video-btn-2')?.removeEventListener('click', this.onVideoBtn2);
                this.el.querySelector('#video-btn-3')?.removeEventListener('click', this.onVideoBtn3);
                this.el.querySelector('#video-btn-4')?.removeEventListener('click', this.onVideoBtn4);
                this.el.querySelector('#close-video-btn')?.removeEventListener('click', this.onCloseVideo);
                this.azoresHitbox?.removeEventListener('click', this.onAzoresClick);
                this.el.querySelector('#close-map-btn')?.removeEventListener('click', this.onCloseMap);
            }
        });
    </script>

    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
        }

        /* ── Starter overlay ────────────────────────────────────── */
        #starter-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(160deg, #001a2e 0%, #003355 60%, #004466 100%);
            color: #fff;
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        #starter-overlay .shark-icon { font-size: 3.5em; margin-bottom: 8px; }
        #starter-overlay h1 {
            font-size: 1.6em;
            font-weight: 700;
            margin: 0 0 6px;
            letter-spacing: 0.02em;
        }
        #starter-overlay .subtitle {
            font-size: 0.95em;
            color: #a8cce8;
            margin: 0 24px 24px;
            max-width: 360px;
            line-height: 1.5;
        }
        #starter-overlay .tap-hint {
            font-size: 0.85em;
            color: #6699bb;
            border: 1px solid #336699;
            padding: 8px 22px;
            border-radius: 20px;
            margin-top: 8px;
        }
    </style>
</head>
<body>

    <!-- ============================================================ -->
    <!--  STARTER OVERLAY                                             -->
    <!--  Satisfies mobile browser "user gesture" requirement and     -->
    <!--  unlocks video elements for later programmatic playback.     -->
    <!-- ============================================================ -->
    <div id="starter-overlay" onclick="unlockVideos(); this.style.display='none';">
        <div class="shark-icon">🦈</div>
        <h1>Whale Shark AR</h1>
        <p class="subtitle">
            Point your camera at the<br>
            <strong>SI2026 conference poster</strong><br>
            to begin the AR experience.
        </p>
        <div class="tap-hint">Tap anywhere to start</div>
    </div>

    <!-- ============================================================ -->
    <!--  A-FRAME SCENE                                               -->
    <!-- ============================================================ -->
    <a-scene
        mindar-image="imageTargetSrc: targets.mind;
                      filterMinCF: 0.0001;
                      filterBeta: 0.1;
                      missTolerance: 5;
                      warmupTolerance: 3;"
        color-space="sRGB"
        renderer="colorManagement: true; physicallyCorrectLights: true"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
    >

        <!-- ════════════════════════════════════════════════════════ -->
        <!--  ASSET MANAGEMENT                                        -->
        <!-- ════════════════════════════════════════════════════════ -->
        <a-assets timeout="60000">

            <!-- Foraging Ecology Videos (muted for broad compatibility;
                 remove 'muted' if audio is desired and testing confirms
                 it works on your target devices) -->
            <video id="videoLungeFeeding"
                src="media/lunge-feeding.mp4"
                preload="auto" loop muted playsinline webkit-playsinline
                crossorigin="anonymous"></video>

            <video id="videoStationaryFeeding"
                src="media/stationary-feeding.mp4"
                preload="auto" loop muted playsinline webkit-playsinline
                crossorigin="anonymous"></video>

            <video id="videoIntraspecific"
                src="media/intraspecific-aggregation.mp4"
                preload="auto" loop muted playsinline webkit-playsinline
                crossorigin="anonymous"></video>

            <video id="videoSnipefish"
                src="media/snipefish.mp4"
                preload="auto" loop muted playsinline webkit-playsinline
                crossorigin="anonymous"></video>

            <!-- 3D Models -->
            <a-asset-item id="whaleSharkModel"  src="3D%20models/whale_shark.glb"></a-asset-item>
            <a-asset-item id="fishParticleModel" src="3D%20models/the_fish_particle.glb"></a-asset-item>
            <a-asset-item id="iPilotModel"       src="3D%20models/iPilot.glb"></a-asset-item>

            <!-- Images -->
            <img id="posterImage"   src="SI2026%20-%20poster-web.jpg"  crossorigin="anonymous">
            <img id="profileImage"  src="media/profile.png"        crossorigin="anonymous">
            <img id="azoresMapImg"  src="media/azores-map.png"     crossorigin="anonymous">

        </a-assets>

        <!-- ════════════════════════════════════════════════════════ -->
        <!--  CAMERA                                                  -->
        <!-- ════════════════════════════════════════════════════════ -->
        <a-camera
            position="0 0 0"
            look-controls="enabled: false"
            cursor="fuse: false; rayOrigin: mouse;"
            raycaster="far: 10000; objects: .clickable"
        ></a-camera>

        <!-- ════════════════════════════════════════════════════════ -->
        <!--  IMAGE TARGET ANCHOR                                     -->
        <!--  Everything inside is positioned relative to the         -->
        <!--  detected poster (1.0 × 1.41 A-Frame units).            -->
        <!--                                                          -->
        <!--  Coordinate reference:                                   -->
        <!--    X  –0.5 (left edge) → +0.5 (right edge)             -->
        <!--    Y  –0.705 (bottom)  → +0.705 (top)                  -->
        <!--    Z   0 (poster face) → positive = toward viewer       -->
        <!-- ════════════════════════════════════════════════════════ -->
        <a-entity mindar-image-target="targetIndex: 0" ar-handler>

            <!-- ──────────────────────────────────────────────────── -->
            <!--  STATIC POSTER PLANE                                 -->
            <!--  Renders the poster image flat on the detected       -->
            <!--  target for visual anchoring.                        -->
            <!-- ──────────────────────────────────────────────────── -->
            <a-plane
                id="static-poster"
                src="#posterImage"
                position="0 0 0"
                width="1"
                height="1.41"
                visible="false"
            ></a-plane>

            <!-- ──────────────────────────────────────────────────── -->
            <!--  WHALE SHARK ORBIT SYSTEM                            -->
            <!--                                                      -->
            <!--  Architecture:                                       -->
            <!--    orbit-parent  – rotates around Y-axis (the        -->
            <!--                   "turntable" providing circular     -->
            <!--                   motion around the poster)          -->
            <!--    whale-shark   – child, offset along +X so it      -->
            <!--                   orbits at radius 0.9 units         -->
            <!--    fish-particle – child, positioned near the shark  -->
            <!--                                                      -->
            <!--  The Y-axis rotation naturally keeps the shark       -->
            <!--  facing the direction of travel throughout the orbit.-->
            <!--  Adjust `dur` to change orbit speed (ms per loop).  -->
            <!-- ──────────────────────────────────────────────────── -->
            <a-entity
                id="orbit-parent"
                position="0 0.05 0.20"
                visible="false"
                animation="property: rotation;
                           from: 0 0 0; to: 0 360 0;
                           dur: 20000; easing: linear; loop: true"
            >
                <!-- Whale Shark -->
                <!-- rotation="0 90 0" orients the model to face the    -->
                <!-- orbit tangent; adjust Y if shark faces wrong way.  -->
                <a-entity
                    id="whale-shark"
                    gltf-model="#whaleSharkModel"
                    position="0.9 0 0"
                    rotation="0 90 0"
                    scale="0.12 0.12 0.12"
                    animation-mixer="clip: *; loop: repeat; timeScale: 0"
                ></a-entity>

                <!-- Fish Particle School (near the shark) -->
                <a-entity
                    id="fish-particle"
                    gltf-model="#fishParticleModel"
                    position="0.70 0.06 0.14"
                    rotation="0 90 0"
                    scale="0.20 0.20 0.20"
                    animation-mixer="clip: *; loop: repeat; timeScale: 0"
                ></a-entity>
            </a-entity>

            <!-- ──────────────────────────────────────────────────── -->
            <!--  iPILOT BIOLOGGING TAG MODEL                         -->
            <!--                                                      -->
            <!--  ⚠ PROVISIONAL POSITION                              -->
            <!--  Estimated below the Multi-sensor Biologging box     -->
            <!--  (left column, upper area of poster).                -->
            <!--  Use coordinate-finder.html to verify against the    -->
            <!--  actual tag image on the printed poster.             -->
            <!--                                                      -->
            <!--  Adjust scale to match desired apparent size.        -->
            <!-- ──────────────────────────────────────────────────── -->
            <a-entity
                id="ipilot-model"
                gltf-model="#iPilotModel"
                position="-0.10 0.22 0.35"
                rotation="0 0 0"
                scale="0.06 0.06 0.06"
                visible="false"
                animation="property: rotation;
                           from: 0 0 0; to: 0 360 0;
                           dur: 10000; easing: linear; loop: true"
            ></a-entity>

            <!-- ──────────────────────────────────────────────────── -->
            <!--  SIDE CONTENT COLUMN (Profile + Contact)             -->
            <!--  Positioned to the LEFT of the poster, slightly      -->
            <!--  angled toward the viewer (rotation Y 10°).          -->
            <!-- ──────────────────────────────────────────────────── -->
            <a-entity
                id="side-content"
                position="-0.75 -0.05 0"
                rotation="0 10 0"
                visible="false"
            >
                <!-- Profile Photo -->
                <a-image
                    src="#profileImage"
                    width="0.30"
                    height="0.30"
                    position="0 0.31 0"
                ></a-image>

                <!-- Name label -->
                <a-text
                    value="Miguel Gandra"
                    align="center"
                    color="#FFFFFF"
                    scale="0.11 0.11 0.11"
                    position="0 0.13 0.005"
                    wrap-count="18"
                ></a-text>

                <!-- Email Button -->
                <a-entity position="0 0.02 0.005">
                    <a-plane
                        class="clickable"
                        clickable="url: mailto:m3gandra@gmail.com"
                        color="#005f8e"
                        width="0.38"
                        height="0.07"
                        animation="property: material.opacity;
                                   from: 0.65; to: 1.0; dur: 750;
                                   dir: alternate; easing: easeInOutSine; loop: true"
                    ></a-plane>
                    <a-text
                        value="✉  m3gandra@gmail.com"
                        align="center" color="#FFF"
                        scale="0.065 0.065 0.065"
                        position="0 0 0.01"
                        wrap-count="24"
                    ></a-text>
                </a-entity>

                <!-- LinkedIn Button -->
                <a-entity position="0 -0.095 0.005">
                    <a-plane
                        class="clickable"
                        clickable="url: https://www.linkedin.com/in/miguel-gandra/"
                        color="#0077B5"
                        width="0.38"
                        height="0.07"
                        animation="property: material.opacity;
                                   from: 0.65; to: 1.0; dur: 750;
                                   dir: alternate; easing: easeInOutSine; loop: true;
                                   delay: 200"
                    ></a-plane>
                    <a-text
                        value="in  LinkedIn Profile"
                        align="center" color="#FFF"
                        scale="0.073 0.073 0.073"
                        position="0 0 0.01"
                        wrap-count="22"
                    ></a-text>
                </a-entity>
            </a-entity>

            <!-- ──────────────────────────────────────────────────── -->
            <!--  FORAGING ECOLOGY – VIDEO PLAY BUTTONS               -->
            <!--                                                      -->
            <!--  ⚠ PROVISIONAL POSITIONS                             -->
            <!--  Each button is overlaid on one of the 4 behaviour   -->
            <!--  images in the "Foraging Ecology: Bait Balls & Tuna" -->
            <!--  section (right column, middle of poster).           -->
            <!--                                                      -->
            <!--  Use coordinate-finder.html to click on each image   -->
            <!--  centre and paste the resulting position string here. -->
            <!--                                                      -->
            <!--  VIDEO ↔ IMAGE MAPPING (verify against poster labels):
                   Button 1 (top-left image)     → Lunge Feeding
                   Button 2 (top-right image)    → Stationary Feeding
                   Button 3 (bottom-left image)  → Intraspecific Agg.
                   Button 4 (bottom-right image) → Snipefish           -->
            <!-- ──────────────────────────────────────────────────── -->
            <a-entity id="video-buttons" visible="false">

                <!-- ─ Button 1: Lunge Feeding (top-left image) ─ -->
                <a-entity
                    id="video-btn-1"
                    class="clickable"
                    position="0.12 0.12 0.01"
                >
                    <a-plane
                        color="#000000" opacity="0.45"
                        width="0.21" height="0.12"
                    ></a-plane>
                    <a-text
                        value="▶" align="center" color="#FFFFFF"
                        scale="0.20 0.20 0.20"
                        position="0 0.015 0.005"
                    ></a-text>
                    <a-text
                        value="Lunge Feeding" align="center" color="#DDDDDD"
                        scale="0.048 0.048 0.048"
                        position="0 -0.038 0.005"
                        wrap-count="18"
                    ></a-text>
                </a-entity>

                <!-- ─ Button 2: Stationary Feeding (top-right image) ─ -->
                <a-entity
                    id="video-btn-2"
                    class="clickable"
                    position="0.36 0.12 0.01"
                >
                    <a-plane
                        color="#000000" opacity="0.45"
                        width="0.21" height="0.12"
                    ></a-plane>
                    <a-text
                        value="▶" align="center" color="#FFFFFF"
                        scale="0.20 0.20 0.20"
                        position="0 0.015 0.005"
                    ></a-text>
                    <a-text
                        value="Stationary Feeding" align="center" color="#DDDDDD"
                        scale="0.048 0.048 0.048"
                        position="0 -0.038 0.005"
                        wrap-count="18"
                    ></a-text>
                </a-entity>

                <!-- ─ Button 3: Intraspecific Aggregation (bottom-left image) ─ -->
                <a-entity
                    id="video-btn-3"
                    class="clickable"
                    position="0.12 0.00 0.01"
                >
                    <a-plane
                        color="#000000" opacity="0.45"
                        width="0.21" height="0.12"
                    ></a-plane>
                    <a-text
                        value="▶" align="center" color="#FFFFFF"
                        scale="0.20 0.20 0.20"
                        position="0 0.015 0.005"
                    ></a-text>
                    <a-text
                        value="Aggregation" align="center" color="#DDDDDD"
                        scale="0.048 0.048 0.048"
                        position="0 -0.038 0.005"
                        wrap-count="18"
                    ></a-text>
                </a-entity>

                <!-- ─ Button 4: Snipefish (bottom-right image) ─ -->
                <a-entity
                    id="video-btn-4"
                    class="clickable"
                    position="0.36 0.00 0.01"
                >
                    <a-plane
                        color="#000000" opacity="0.45"
                        width="0.21" height="0.12"
                    ></a-plane>
                    <a-text
                        value="▶" align="center" color="#FFFFFF"
                        scale="0.20 0.20 0.20"
                        position="0 0.015 0.005"
                    ></a-text>
                    <a-text
                        value="Snipefish" align="center" color="#DDDDDD"
                        scale="0.048 0.048 0.048"
                        position="0 -0.038 0.005"
                        wrap-count="18"
                    ></a-text>
                </a-entity>

            </a-entity><!-- end #video-buttons -->

            <!-- ──────────────────────────────────────────────────── -->
            <!--  DARK OVERLAY (dims poster when popup is open)       -->
            <!--  Sits just in front of the poster plane (z=0.025).  -->
            <!--  Hidden by default; ar-handler shows it with panels. -->
            <!-- ──────────────────────────────────────────────────── -->
            <a-plane
                id="panel-overlay"
                color="#000000"
                opacity="0.80"
                width="1"
                height="1.41"
                position="0 0 0.025"
                visible="false"
            ></a-plane>

            <!-- ──────────────────────────────────────────────────── -->
            <!--  VIDEO POPUP PANEL                                   -->
            <!--  Floats well in front of the poster (z=0.55).       -->
            <!--  Video aspect ratio: 16:9 (0.82 × 0.46).            -->
            <!--  Swap dimensions if footage is portrait or 4:3.     -->
            <!-- ──────────────────────────────────────────────────── -->
            <a-entity id="video-popup" position="0 0.02 0.55" visible="false">

                <!-- Title bar -->
                <a-plane
                    color="#001830" opacity="0.95"
                    width="0.82" height="0.065"
                    position="0 0.263 0"
                ></a-plane>
                <a-text
                    id="video-title-text"
                    value="▶  Video"
                    align="center" color="#AAD4F5"
                    scale="0.072 0.072 0.072"
                    position="0 0.263 0.005"
                    wrap-count="30"
                ></a-text>

                <!-- Video screen -->
                <a-plane
                    id="video-screen"
                    material="shader: flat; src: #videoLungeFeeding"
                    width="0.82"
                    height="0.46"
                    position="0 0 0"
                ></a-plane>

                <!-- Bottom hint bar -->
                <a-plane
                    color="#001830" opacity="0.80"
                    width="0.82" height="0.05"
                    position="0 -0.255 0"
                ></a-plane>
                <a-text
                    value="Tap  ✕  to close"
                    align="center" color="#7799BB"
                    scale="0.055 0.055 0.055"
                    position="0 -0.255 0.005"
                    wrap-count="28"
                ></a-text>

                <!-- Close button (top-right corner of popup) -->
                <a-entity id="close-video-btn" class="clickable" position="0.38 0.263 0.01">
                    <a-plane
                        color="#CC2222" opacity="0.90"
                        width="0.065" height="0.065"
                        animation="property: material.opacity;
                                   from: 0.55; to: 0.95; dur: 750;
                                   dir: alternate; easing: easeInOutSine; loop: true"
                    ></a-plane>
                    <a-text value="✕" align="center" color="#FFF" scale="0.10 0.10 0.10" position="0 0 0.005"></a-text>
                </a-entity>

            </a-entity><!-- end #video-popup -->

            <!-- ──────────────────────────────────────────────────── -->
            <!--  AZORES MAP – INVISIBLE HIT-BOX                      -->
            <!--                                                      -->
            <!--  ⚠ PROVISIONAL POSITION                              -->
            <!--  Estimated over the Azores map figure (upper area    -->
            <!--  of the poster, above the Foraging Ecology section). -->
            <!--  Use coordinate-finder.html to click the centre of   -->
            <!--  the map figure and paste the position here.         -->
            <!--                                                      -->
            <!--  The plane has opacity="0" so it is invisible but    -->
            <!--  still intercepts raycaster clicks when visible.     -->
            <!-- ──────────────────────────────────────────────────── -->
            <a-plane
                id="azores-hitbox"
                class="clickable"
                position="0.34 0.38 0.01"
                width="0.22"
                height="0.20"
                color="#FFFFFF"
                opacity="0"
                visible="false"
            ></a-plane>

            <!-- ──────────────────────────────────────────────────── -->
            <!--  AZORES MAP POPUP PANEL                              -->
            <!--  High-resolution map displayed in a floating plane.  -->
            <!--  Aspect ratio 4:3 (0.88 × 0.66).                    -->
            <!--  Adjust dimensions to match azores-map.png ratio.   -->
            <!-- ──────────────────────────────────────────────────── -->
            <a-entity id="azores-popup" position="0 0.02 0.55" visible="false">

                <!-- Title bar -->
                <a-plane
                    color="#001830" opacity="0.95"
                    width="0.88" height="0.065"
                    position="0 0.363 0"
                ></a-plane>
                <a-text
                    value="🗺  Whale Shark Distribution – Azores"
                    align="center" color="#AAD4F5"
                    scale="0.065 0.065 0.065"
                    position="0 0.363 0.005"
                    wrap-count="38"
                ></a-text>

                <!-- Map image plane -->
                <a-plane
                    src="#azoresMapImg"
                    width="0.88"
                    height="0.66"
                    position="0 0.01 0"
                ></a-plane>

                <!-- Bottom hint bar -->
                <a-plane
                    color="#001830" opacity="0.80"
                    width="0.88" height="0.05"
                    position="0 -0.32 0"
                ></a-plane>
                <a-text
                    value="Tap  ✕  to close"
                    align="center" color="#7799BB"
                    scale="0.055 0.055 0.055"
                    position="0 -0.32 0.005"
                    wrap-count="30"
                ></a-text>

                <!-- Close button -->
                <a-entity id="close-map-btn" class="clickable" position="0.41 0.363 0.01">
                    <a-plane
                        color="#CC2222" opacity="0.90"
                        width="0.065" height="0.065"
                        animation="property: material.opacity;
                                   from: 0.55; to: 0.95; dur: 750;
                                   dir: alternate; easing: easeInOutSine; loop: true"
                    ></a-plane>
                    <a-text value="✕" align="center" color="#FFF" scale="0.10 0.10 0.10" position="0 0 0.005"></a-text>
                </a-entity>

            </a-entity><!-- end #azores-popup -->

        </a-entity><!-- end mindar-image-target -->
    </a-scene>

</body>
</html>
